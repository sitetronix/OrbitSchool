<div class="checkout">

    <h1>🛒 Оформлення замовлення</h1>

    <div class="order-box">

        <h2>Ваше замовлення</h2>

        <div id="order-items"></div>

        <div class="total">
            Сума:
            <span id="order-total">0</span>
            грн
        </div>

    </div>

    <form id="checkout-form">

        <input
            type="text"
            id="firstName"
            placeholder="Ім'я"
            required>

        <input
            type="text"
            id="lastName"
            placeholder="Прізвище"
            required>

        <input
            type="tel"
            id="phone"
            placeholder="Телефон"
            required>

        <input
            type="email"
            id="email"
            placeholder="Email">

        <textarea
            id="comment"
            placeholder="Коментар"></textarea>

        <button type="submit">
            Підтвердити замовлення
        </button>

    </form>



</div>
