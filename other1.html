<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OrbitLearn</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  background:white;
  font-family:Arial,sans-serif;
  color:#111;
}

canvas{
  position:fixed;
  inset:0;
  z-index:-2;
}

/* =========================
NAVBAR
========================= */

.navbar{
  position:fixed;
  top:18px;
  left:50%;
  transform:translateX(-50%);

  width:92%;
  max-width:1400px;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:18px 28px;

  border-radius:24px;

  background:rgba(255,255,255,0.72);

  backdrop-filter:blur(18px);

  border:1px solid rgba(0,0,0,0.05);

  z-index:100;
}

.logo{
  font-size:22px;
  font-weight:700;
}

.nav-links{
  display:flex;
  gap:42px;
}

.nav-links a{
  text-decoration:none;
  color:#111;
  font-size:14px;
  font-weight:500;
}

.nav-right{
  display:flex;
  align-items:center;
  gap:14px;
}

.lang{
  padding:10px 14px;
  border-radius:12px;
  background:#f4f4f4;
  font-size:13px;
  font-weight:600;
}

.cart{
  width:42px;
  height:42px;

  border-radius:12px;

  background:#f4f4f4;

  display:flex;
  align-items:center;
  justify-content:center;

  position:relative;
}

.cart::after{
  content:'2';

  position:absolute;

  top:-4px;
  right:-4px;

  width:18px;
  height:18px;

  border-radius:50%;

  background:black;
  color:white;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:10px;
}

.login-btn{
  border:none;
  background:black;
  color:white;

  padding:12px 18px;

  border-radius:12px;

  cursor:pointer;

  font-size:13px;
  font-weight:600;
}

/* =========================
BACKGROUND LIGHT
========================= */

.bg-light{
  position:fixed;
  inset:0;

  z-index:-3;

  background:
  radial-gradient(circle at center,
  rgba(181,147,255,0.18),
  white 55%);
}

/* =========================
HERO
========================= */

.hero{
  width:100%;
  height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;

  position:relative;
}

/* =========================
ORBIT
========================= */

.orbit-wrapper{
  position:relative;

  width:900px;
  height:900px;

  display:flex;
  align-items:center;
  justify-content:center;
}

.orbit{
  position:absolute;

  border-radius:50%;

  border:1px solid rgba(145,115,255,0.22);
}

.orbit-1{
  width:380px;
  height:380px;
}

.orbit-2{
  width:650px;
  height:650px;
}

/* =========================
CENTER CORE
========================= */

.energy-core{
  position:absolute;

  width:180px;
  height:180px;

  border-radius:50%;

  background:
  radial-gradient(circle,
  rgba(255,255,255,1) 0%,
  rgba(216,195,255,0.9) 18%,
  rgba(180,140,255,0.45) 40%,
  rgba(255,255,255,0) 75%);

  filter:blur(10px);

  animation:corePulse 8s ease-in-out infinite;
}

.energy-core::before{
  content:'';

  position:absolute;
  inset:-40px;

  border-radius:50%;

  background:
  radial-gradient(circle,
  rgba(180,140,255,0.2),
  transparent 70%);

  filter:blur(24px);
}

@keyframes corePulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.08);
  }

  100%{
    transform:scale(1);
  }

}

/* =========================
CARDS
========================= */

.orbit-card{
  position:absolute;

  display:flex;
  align-items:center;
  gap:10px;

  padding:14px 18px;

  border-radius:18px;

  background:rgba(255,255,255,0.85);

  backdrop-filter:blur(18px);

  border:1px solid rgba(255,255,255,0.9);

  box-shadow:
  0 10px 40px rgba(0,0,0,0.05);

  font-size:14px;
  font-weight:500;

  color:#222;

  white-space:nowrap;
}

.orbit-card span{
  font-size:16px;
}

/* OUTER */

.card-top{
  top:80px;
}

.card-right{
  right:40px;
}

.card-bottom{
  bottom:100px;
}

.card-left{
  left:60px;
}

/* INNER */

.card-inner-top{
  top:230px;
}

.card-inner-bottom{
  bottom:240px;
}

/* =========================
MOBILE
========================= */

@media(max-width:900px){

  .nav-links{
    display:none;
  }

  .orbit-wrapper{
    transform:scale(0.7);
  }

}

</style>
</head>

<body>

<div class="bg-light"></div>

<!-- =========================
NAVBAR
========================= -->

<nav class="navbar">

  <div class="logo">
    OrbitLearn
  </div>

  <div class="nav-links">
    <a href="#">Курсы</a>
    <a href="#">Отзывы</a>
    <a href="#">Подросткам</a>
    <a href="#">Детям</a>
    <a href="#">Родителям</a>
  </div>

  <div class="nav-right">

    <div class="lang">
      RU
    </div>

    <div class="cart">
      🛒
    </div>

    <button class="login-btn">
      Войти
    </button>

  </div>

</nav>

<!-- =========================
HERO
========================= -->

<section class="hero">

  <div class="orbit-wrapper" id="orbitWrapper">

    <div class="orbit orbit-1"></div>
    <div class="orbit orbit-2"></div>

    <!-- CENTER -->

    <div class="energy-core"></div>

    <!-- OUTER -->

    <div class="orbit-card card-top">
      🤖 Работа с AI
    </div>

    <div class="orbit-card card-right">
      👨‍🏫 Преподаватели
    </div>

    <div class="orbit-card card-bottom">
      🎁 Подарки
    </div>

    <div class="orbit-card card-left">
      💻 Онлайн-код
    </div>

    <!-- INNER -->

    <div class="orbit-card card-inner-top">
      🐍 Курсы Python
    </div>

    <div class="orbit-card card-inner-bottom">
      📚 Предметы
    </div>

  </div>

</section>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

// =========================
// SCENE
// =========================

const scene = new THREE.Scene();

// =========================
// CAMERA
// =========================

const camera = new THREE.OrthographicCamera(
  window.innerWidth / -2,
  window.innerWidth / 2,
  window.innerHeight / 2,
  window.innerHeight / -2,
  1,
  3000
);

camera.position.z = 10;

// =========================
// RENDERER
// =========================

const renderer = new THREE.WebGLRenderer({
  antialias:true,
  alpha:true
});

renderer.setSize(
  window.innerWidth,
  window.innerHeight
);

renderer.setPixelRatio(
  window.devicePixelRatio
);

document.body.appendChild(
  renderer.domElement
);

// =========================
// PARTICLES
// =========================

const particlesCount = 130;

const particlePositions = [];
const particleSpeeds = [];

const safeZone = 430;

for(let i=0;i<particlesCount;i++){

  let x,y;

  do{

    x =
    (Math.random()-0.5)
    * window.innerWidth;

    y =
    (Math.random()-0.5)
    * window.innerHeight;

  }

  while(
    Math.sqrt(x*x+y*y)
    < safeZone
  );

  particlePositions.push({
    x:x,
    y:y,
    z:0
  });

  particleSpeeds.push({

    x:(Math.random()-0.5)*0.18,

    y:(Math.random()-0.5)*0.18

  });

}

// =========================
// GEOMETRY
// =========================

const particlesGeometry =
new THREE.BufferGeometry();

const positions =
new Float32Array(
  particlesCount * 3
);

for(let i=0;i<particlesCount;i++){

  positions[i*3] =
  particlePositions[i].x;

  positions[i*3+1] =
  particlePositions[i].y;

  positions[i*3+2] = 0;

}

particlesGeometry.setAttribute(
  'position',

  new THREE.BufferAttribute(
    positions,
    3
  )
);

// =========================
// POINTS
// =========================

const particlesMaterial =
new THREE.PointsMaterial({

  color:0x111111,

  size:2,

  transparent:true,

  opacity:0.7

});

const particles =
new THREE.Points(
  particlesGeometry,
  particlesMaterial
);

scene.add(particles);

// =========================
// LINES
// =========================

const lineMaterial =
new THREE.LineBasicMaterial({

  color:0x8f6bff,

  transparent:true,

  opacity:0.35

});

const lineGeometry =
new THREE.BufferGeometry();

const linePositions = [];

const lines =
new THREE.LineSegments(
  lineGeometry,
  lineMaterial
);

scene.add(lines);

// =========================
// ORBIT ROTATION
// =========================

const orbitWrapper =
document.getElementById(
  'orbitWrapper'
);

// =========================
// ANIMATE
// =========================

function animate(){

  requestAnimationFrame(
    animate
  );

  // ROTATE ORBIT

  orbitWrapper.style.transform =
  `rotate(${performance.now() * 0.0007}deg)`;

  // PARTICLES

  for(let i=0;i<particlesCount;i++){

    particlePositions[i].x +=
    particleSpeeds[i].x;

    particlePositions[i].y +=
    particleSpeeds[i].y;

    const dist =
    Math.sqrt(
      particlePositions[i].x *
      particlePositions[i].x +

      particlePositions[i].y *
      particlePositions[i].y
    );

    // SAFE ZONE

    if(dist < safeZone){

      particleSpeeds[i].x *= -1;
      particleSpeeds[i].y *= -1;

    }

    // WALLS

    if(
      particlePositions[i].x >
      window.innerWidth/2 ||

      particlePositions[i].x <
      -window.innerWidth/2
    ){

      particleSpeeds[i].x *= -1;

    }

    if(
      particlePositions[i].y >
      window.innerHeight/2 ||

      particlePositions[i].y <
      -window.innerHeight/2
    ){

      particleSpeeds[i].y *= -1;

    }

    positions[i*3] =
    particlePositions[i].x;

    positions[i*3+1] =
    particlePositions[i].y;

  }

  particlesGeometry
  .attributes
  .position
  .needsUpdate = true;

  // =========================
  // LINES
  // =========================

  linePositions.length = 0;

  for(let i=0;i<particlesCount;i++){

    for(let j=i+1;j<particlesCount;j++){

      const dx =
      particlePositions[i].x -
      particlePositions[j].x;

      const dy =
      particlePositions[i].y -
      particlePositions[j].y;

      const distance =
      Math.sqrt(dx*dx + dy*dy);

      if(distance < 170){

        linePositions.push(
          particlePositions[i].x,
          particlePositions[i].y,
          0
        );

        linePositions.push(
          particlePositions[j].x,
          particlePositions[j].y,
          0
        );

      }

    }

  }

  lineGeometry.setAttribute(

    'position',

    new THREE.Float32BufferAttribute(
      linePositions,
      3
    )

  );

  renderer.render(
    scene,
    camera
  );

}

animate();

// =========================
// RESIZE
// =========================

window.addEventListener(
  'resize',
  ()=>{

    camera.left =
    window.innerWidth / -2;

    camera.right =
    window.innerWidth / 2;

    camera.top =
    window.innerHeight / 2;

    camera.bottom =
    window.innerHeight / -2;

    camera.updateProjectionMatrix();

    renderer.setSize(
      window.innerWidth,
      window.innerHeight
    );

  }
);

</script>

</body>
</html>
